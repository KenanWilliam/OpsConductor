<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <radialGradient id="ag" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00C2FF" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#00C2FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="f1" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <style>
      /* Mid ring draw-in */
      .mid-arc {
        stroke-dasharray: 210;
        stroke-dashoffset: 210;
        animation: drawMid 1.1s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
      }
      /* Inner ring draw-in */
      .inner-arc {
        stroke-dasharray: 140;
        stroke-dashoffset: 140;
        animation: drawInner 0.9s cubic-bezier(0.16,1,0.3,1) 0.7s forwards;
      }
      /* Outer ring fade in */
      .outer-ring {
        opacity: 0;
        animation: fadeIn 0.6s ease 0.1s forwards;
      }
      /* Pupil pop */
      .pupil-group {
        transform-origin: 57px 44px;
        transform: scale(0);
        opacity: 0;
        animation: popIn 0.5s cubic-bezier(0.16,1,0.3,1) 1.1s forwards;
      }
      /* Pupil dot pulse — after entrance, loops forever */
      .pupil-dot {
        transform-origin: 57px 44px;
        animation: popIn 0.5s cubic-bezier(0.16,1,0.3,1) 1.1s forwards,
                   pulse 3s ease-in-out 2s infinite;
      }
      /* Ambient glow breath */
      .amb-glow {
        animation: breath 6s ease-in-out 1.8s infinite;
      }

      @keyframes drawMid {
        to { stroke-dashoffset: 0; }
      }
      @keyframes drawInner {
        to { stroke-dashoffset: 0; }
      }
      @keyframes fadeIn {
        to { opacity: 1; }
      }
      @keyframes popIn {
        from { transform: scale(0); opacity: 0; }
        to   { transform: scale(1); opacity: 1; }
      }
      @keyframes pulse {
        0%,100% { opacity: 1; }
        50%      { opacity: 0.55; }
      }
      @keyframes breath {
        0%,100% { opacity: 0.8; r: 44; }
        50%      { opacity: 1;   r: 46; }
      }
    </style>
  </defs>

  <!-- Ambient glow — breathes after load -->
  <circle class="amb-glow" cx="50" cy="50" r="44" fill="url(#ag)" opacity="0.8"/>

  <!-- Outer ring — fades in -->
  <circle class="outer-ring" cx="50" cy="50" r="43" stroke="#14141C" stroke-width="1.2" fill="none"/>

  <!-- Mid ring — draws in -->
  <path class="mid-arc"
    d="M 50 17 A 33 33 0 1 1 21.5 66.5"
    stroke="#00C2FF" stroke-width="2.8" stroke-linecap="round" fill="none"
    filter="url(#f1)"/>

  <!-- Inner ring — draws in with delay -->
  <path class="inner-arc"
    d="M 50 28 A 22 22 0 1 1 30 66"
    stroke="#00C2FF" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.45"/>

  <!-- Pupil group — pops in -->
  <g class="pupil-group">
    <!-- Glow halo -->
    <circle cx="57" cy="44" r="10" fill="#00C2FF" opacity="0.08"/>
    <!-- Dark body -->
    <circle cx="57" cy="44" r="7.5" fill="#07070A"/>
    <!-- Border -->
    <circle cx="57" cy="44" r="7.5" stroke="#00C2FF" stroke-width="2.2" fill="none" filter="url(#f1)"/>
  </g>

  <!-- Pupil inner dot — pulses independently -->
  <circle class="pupil-dot" cx="57" cy="44" r="3.2" fill="#00C2FF"/>

</svg>
