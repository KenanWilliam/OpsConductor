<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00C2FF" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#00C2FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Ambient glow -->
  <circle cx="50" cy="50" r="45" fill="url(#glow)"/>

  <!-- Outer ring — full, very dim -->
  <circle cx="50" cy="50" r="43" stroke="#14141C" stroke-width="1.2" fill="none"/>

  <!-- Mid ring — 270° arc (cyan, glow) -->
  <!-- Start: top-left (about -120°), end: bottom (about 180°) -->
  <path d="
    M 50 17
    A 33 33 0 1 1 21.5 66.5
  " stroke="#00C2FF" stroke-width="2.8" stroke-linecap="round" fill="none" filter="url(#blur-glow)"/>

  <!-- Inner ring — 210° arc, softer -->
  <path d="
    M 50 28
    A 22 22 0 1 1 30 66
  " stroke="#00C2FF" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.45"/>

  <!-- Pupil — offset toward 2 o'clock (~-40°) -->
  <!-- Center: 50+10*cos(-40°) ≈ 57.7, 50+10*sin(-40°) ≈ 43.6 -->

  <!-- Glow halo behind pupil -->
  <circle cx="57" cy="44" r="10" fill="#00C2FF" opacity="0.08"/>

  <!-- Pupil dark body -->
  <circle cx="57" cy="44" r="7.5" fill="#07070A"/>

  <!-- Pupil border glow -->
  <circle cx="57" cy="44" r="7.5" stroke="#00C2FF" stroke-width="2.2" fill="none" filter="url(#blur-glow)"/>

  <!-- Pupil inner dot -->
  <circle cx="57" cy="44" r="3.2" fill="#00C2FF"/>

</svg>
